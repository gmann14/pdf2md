<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- PDF icon -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="120" height="150" rx="8" fill="#ef4444" opacity="0.9"/>
    <rect x="15" y="50" width="90" height="8" rx="4" fill="#fff" opacity="0.6"/>
    <rect x="15" y="70" width="70" height="8" rx="4" fill="#fff" opacity="0.6"/>
    <rect x="15" y="90" width="80" height="8" rx="4" fill="#fff" opacity="0.6"/>
    <rect x="15" y="110" width="60" height="8" rx="4" fill="#fff" opacity="0.6"/>
    <text x="60" y="35" fill="#fff" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">PDF</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(280, 235)">
    <line x1="0" y1="20" x2="80" y2="20" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"/>
    <polyline points="65,8 82,20 65,32" fill="none" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- MD icon -->
  <g transform="translate(400, 180)">
    <rect x="0" y="0" width="120" height="150" rx="8" fill="#3b82f6" opacity="0.9"/>
    <text x="15" y="45" fill="#fff" font-family="monospace" font-size="16" opacity="0.8"># Title</text>
    <text x="15" y="70" fill="#fff" font-family="monospace" font-size="14" opacity="0.6">Lorem ipsum</text>
    <text x="15" y="90" fill="#fff" font-family="monospace" font-size="14" opacity="0.6">- item one</text>
    <text x="15" y="110" fill="#fff" font-family="monospace" font-size="14" opacity="0.6">- item two</text>
    <text x="15" y="130" fill="#fff" font-family="monospace" font-size="14" opacity="0.6">**bold**</text>
    <text x="60" y="35" fill="#fff" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" opacity="0">MD</text>
  </g>
  <!-- Main text -->
  <text x="620" y="240" fill="#fff" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="bold">pdf2md</text>
  <text x="620" y="300" fill="#93c5fd" font-family="system-ui, -apple-system, sans-serif" font-size="28">PDF to Markdown Converter</text>
  <text x="620" y="355" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="22">Free. Private. Client-side only.</text>
  <!-- Footer badges -->
  <g transform="translate(620, 400)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#1e40af" opacity="0.5"/>
    <text x="55" y="21" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">Open Source</text>
    <rect x="125" y="0" width="130" height="32" rx="16" fill="#1e40af" opacity="0.5"/>
    <text x="190" y="21" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">No Upload</text>
    <rect x="270" y="0" width="90" height="32" rx="16" fill="#1e40af" opacity="0.5"/>
    <text x="315" y="21" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle">MIT</text>
  </g>
</svg>
